<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="theme-color" content="#667eea">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💳</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💳</text></svg>">
    <meta name="apple-mobile-web-app-title" content="הארנק שלי">
    
    <title>הטבות וגיפטקארדים שלי</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header>
            <h1>הארנק הדיגיטלי שלי 👛</h1>
            <p>הכסף הצבור והטבות המועדון שלך במקום אחד</p>
        </header>

        <main>
            <section class="add-benefit-section">
                <h3>✨ הוספת / עדכון גיפטקארד</h3>
                <form id="benefitForm">
                    <input type="text" id="benefitNameInput" placeholder="שם הכרטיס או ההטבה (למשל: שובר סוויש)" required>
                    
                    <textarea id="storesInput" rows="2" placeholder="באילו רשתות זה תקף? (למשל: רנואר, קסטרו...)" required></textarea>
                    
                    <select id="typeInput" required>
                        <option value="" disabled selected>סוג ההטבה</option>
                        <option value="giftcard">גיפטקארד / כרטיס נטען</option>
                        <option value="club">מועדון לקוחות / ארגון</option>
                    </select>

                    <select id="usageInput" required>
                        <option value="" disabled selected>איפה ניתן לממש?</option>
                        <option value="both">גם בחנויות וגם באונליין</option>
                        <option value="online">באונליין בלבד</option>
                        <option value="instore">בסניפים פיזיים בלבד</option>
                    </select>

                    <input type="text" id="detailsInput" placeholder="פרטים (למשל: יתרה 200 ש״ח, או 10% הנחה)" required>
                    <input type="text" id="expiryInput" placeholder="תאריך תפוגה (פורמט: 31/12/2026)">
                    
                    <button type="submit" id="submitBtn">שמירה בארנק</button>
                </form>
            </section>

            <section id="alertsContainer" class="alerts-section"></section>

            <section class="search-section">
                <input type="text" id="searchInput" placeholder="🔍 חפשי חנות (למשל: פוקס או fox)...">
            </section>

            <section id="resultsContainer" class="results-section"></section>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
